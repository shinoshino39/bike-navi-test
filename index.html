<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自転車ナビウインカー試作</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
      background: #f7f7f7;
    }

    h1 {
      font-size: 24px;
    }

    .card {
      background: white;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .label {
      font-size: 14px;
      color: #555;
      margin-bottom: 4px;
    }

    .big {
      font-size: 28px;
      font-weight: bold;
      color: #222;
    }

    button {
      font-size: 17px;
      padding: 12px 18px;
      margin: 6px 4px;
      border-radius: 8px;
      border: 1px solid #999;
      background: white;
      cursor: pointer;
    }

    button:active {
      background: #e0e0e0;
    }

    .status {
      font-weight: bold;
      color: #333;
    }

    .small {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- GPS判定成功版：右折・左折表示確認済み -->
  <!-- Bluetooth送信準備版：現在は sendCommand() で画面表示のみ -->

  <h1>ナビ連動ウインカー試作</h1>

  <div class="card">
    <div class="label">現在地</div>
    <div id="current">取得前</div>
  </div>

  <div class="card">
    <div class="label">次の案内</div>
    <div id="next" class="big">待機中</div>
    <div id="distance">距離：---</div>
  </div>

  <div class="card">
    <div class="label">GPS操作</div>
    <button onclick="startGPS()">GPS開始</button>
    <button onclick="resetRoute()">判定リセット</button>
  </div>

  <div class="card">
    <div class="label">Bluetooth操作テスト</div>
    <button onclick="connectBLE()">ESP32接続</button>
    <button onclick="sendCommand('L')">左折送信</button>
    <button onclick="sendCommand('R')">右折送信</button>
    <button onclick="sendCommand('B')">ブレーキ送信</button>
    <button onclick="sendCommand('O')">消灯</button>
    <div class="small">
      ※今はBluetooth未接続なので、送信予定の文字だけ表示します。
    </div>
  </div>

  <div class="card">
    <div class="label">送信ステータス</div>
    <div id="sendStatus" class="status">未送信</div>
  </div>

  <script>
    // =========================
    // ルート設定
    // lat / lng は、成功した大学近くの座標に書き換える
    // command は R が右折、L が左折
    // =========================
    const routePoints = [
      {
        name: "1つ目の曲がり角",
        lat: 35.531770,
        lng: 139.532739,
        command: "L"
      },
      {
        name: "2つ目の曲がり角",
        lat: 35.532089,
        lng: 139.533608,
        command: "R"
      }
    ];

    // 反応距離。最初は60mくらいがテストしやすい
    const triggerDistance = 40;

    let currentIndex = 0;
    let alreadyTriggered = false;
    let watchId = null;

    function startGPS() {
      if (!navigator.geolocation) {
        alert("この端末ではGPSが使えません");
        return;
      }

      document.getElementById("next").textContent = "GPS取得中";

      watchId = navigator.geolocation.watchPosition(
        checkPosition,
        showError,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    function checkPosition(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      document.getElementById("current").textContent =
        `緯度：${lat.toFixed(6)} / 経度：${lng.toFixed(6)}`;

      if (currentIndex >= routePoints.length) {
        document.getElementById("next").textContent = "ルート終了";
        document.getElementById("distance").textContent = "距離：---";
        return;
      }

      const target = routePoints[currentIndex];
      const distance = getDistance(lat, lng, target.lat, target.lng);

      document.getElementById("distance").textContent =
        `${target.name}まで：約${Math.round(distance)}m`;

      if (distance <= triggerDistance && !alreadyTriggered) {
        alreadyTriggered = true;

        if (target.command === "R") {
          document.getElementById("next").textContent = "右折ウインカー開始";
          sendCommand("R");
        } else if (target.command === "L") {
          document.getElementById("next").textContent = "左折ウインカー開始";
          sendCommand("L");
        }

        // 15秒後に消灯命令を出して、次の地点へ進む
        setTimeout(() => {
          sendCommand("O");

          currentIndex++;
          alreadyTriggered = false;

          if (currentIndex >= routePoints.length) {
            document.getElementById("next").textContent = "ルート終了";
          } else {
            document.getElementById("next").textContent = "次の地点へ";
          }
        }, 15000);

      } else if (!alreadyTriggered) {
        document.getElementById("next").textContent =
          `次は${target.command === "R" ? "右折" : "左折"}`;
      }
    }

    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const radLat1 = lat1 * Math.PI / 180;
      const radLat2 = lat2 * Math.PI / 180;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(radLat1) * Math.cos(radLat2) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function resetRoute() {
      currentIndex = 0;
      alreadyTriggered = false;

      document.getElementById("next").textContent = "リセット完了";
      document.getElementById("distance").textContent = "距離：---";
      document.getElementById("sendStatus").textContent = "未送信";

      sendCommand("O");
    }

    function showError(error) {
      alert("GPS取得に失敗しました：" + error.message);
    }

// =========================
// Bluetooth本番送信部分
// ESP32側のUUIDと必ず一致させる
// =========================

const DEVICE_NAME = "BikeNaviLED";
const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
const CHARACTERISTIC_UUID = "abcd1234-5678-90ab-cdef-1234567890ab";

let bleDevice = null;
let bleServer = null;
let commandCharacteristic = null;

async function connectBLE() {
  try {
    if (!navigator.bluetooth) {
      alert("このブラウザはWeb Bluetoothに対応していません。AndroidのChromeで試してください。");
      document.getElementById("sendStatus").textContent =
        "Bluetooth非対応：Android Chromeでテストしてください";
      return;
    }

    document.getElementById("sendStatus").textContent =
      "ESP32を検索中...";

    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [
        { name: DEVICE_NAME }
      ],
      optionalServices: [SERVICE_UUID]
    });

    bleDevice.addEventListener("gattserverdisconnected", onDisconnected);

    document.getElementById("sendStatus").textContent =
      "ESP32に接続中...";

    bleServer = await bleDevice.gatt.connect();

    const service = await bleServer.getPrimaryService(SERVICE_UUID);
    commandCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

    document.getElementById("sendStatus").textContent =
      "ESP32接続済み";

    console.log("BLE接続成功");

  } catch (error) {
    console.error(error);
    document.getElementById("sendStatus").textContent =
      "BLE接続失敗：" + error.message;
    alert("BLE接続に失敗しました：" + error.message);
  }
}

async function sendCommand(command) {
  let label = "";

  if (command === "L") {
    label = "左折 L";
  } else if (command === "R") {
    label = "右折 R";
  } else if (command === "O") {
    label = "消灯 O";
  } else if (command === "B") {
    label = "ブレーキ B";
  } else {
    label = command;
  }

  // まだBluetooth接続していない場合
  if (!commandCharacteristic) {
    document.getElementById("sendStatus").textContent =
      `未接続：送信予定 ${label}`;
    console.log("未接続のため送信できません:", command);
    return;
  }

  try {
    const encoder = new TextEncoder();
    const data = encoder.encode(command);

    // Chromeの対応状況に合わせて使い分け
    if (commandCharacteristic.writeValueWithResponse) {
      await commandCharacteristic.writeValueWithResponse(data);
    } else {
      await commandCharacteristic.writeValue(data);
    }

    document.getElementById("sendStatus").textContent =
      `送信済み：${label}`;

    console.log("送信済み:", command);

  } catch (error) {
    console.error(error);
    document.getElementById("sendStatus").textContent =
      "送信失敗：" + error.message;
  }
}

function onDisconnected() {
  commandCharacteristic = null;
  bleServer = null;

  document.getElementById("sendStatus").textContent =
    "ESP32との接続が切断されました";

  console.log("BLE切断");
}
  </script>
</body>
</html>
